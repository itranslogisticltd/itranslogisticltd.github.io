<script>
function trackShipment() {

    const trackingNumber = document.getElementById("trackingInput").value.trim().toUpperCase();
    const resultDiv = document.getElementById("result");

    const shipments = {
        "ITL987654": {
            status: "Held at Customs - Kuwait Customs Authority",
            destination: "Kuwait City, Kuwait",
            updates: [
                "Shipment received at origin facility - Haifa Cargo Seaport, Israel",
                "Export documentation verified - Israel Customs Authority",
                "Departed Haifa Cargo Seaport, Israel",
                "Arrived at Shuwaikh Port, Kuwait",
                "Under customs inspection - Kuwait Customs Authority",
                "Status: Held at Customs pending clearance"
            ]
        }
    };

    if (shipments[trackingNumber]) {

        const shipment = shipments[trackingNumber];

        let updatesHTML = <ul style="text-align:left; margin-top:15px;">;

        shipment.updates.forEach(update => {
            updatesHTML += <li style="margin-bottom:8px;">✔️ ${update}</li>;
        });

        updatesHTML += </ul>;

        resultDiv.innerHTML = `
            <div style="
                background:white;
                color:#333;
                padding:20px;
                margin-top:20px;
                border-radius:20px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            ">
                <h3>Shipment Found</h3>
                <p><strong>Status:</strong> ${shipment.status}</p>
                <p><strong>Destination:</strong> ${shipment.destination}</p>
                ${updatesHTML}
            </div>
        `;

    } else {

        resultDiv.innerHTML = `
            <div style="
                background:#fff3f3;
                color:red;
                padding:15px;
                margin-top:20px;
                border-radius:15px;
            ">
                Tracking Number Not Found
            </div>
        `;
    }
}
</script>
